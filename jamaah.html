<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Detail Tabungan Jamaah</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="header">
      <img src="logo.png" class="logo">
      <h2>Detail Tabungan Jamaah</h2>
    </div>

    <div id="loading" class="loading">
      Memuat data...
    </div>

    <div id="content" class="content hidden">

      <div class="card">
        <h3 id="nama">Nama Jamaah</h3>
        <p id="va"></p>
      </div>

      <div class="card total-card">
        <p>Total Tabungan</p>
        <h1 id="total">Rp 0</h1>
      </div>

      <div class="card">
        <h3>Riwayat Transaksi</h3>
        <table>
          <thead>
            <tr>
              <th>Tanggal</th>
              <th>Nominal</th>
              <th>Saldo</th>
            </tr>
          </thead>
          <tbody id="transaksiBody">
          </tbody>
        </table>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
