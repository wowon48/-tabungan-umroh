<script>
document.addEventListener("DOMContentLoaded", function () {

  const params = new URLSearchParams(window.location.search);
  const userId = params.get("user_id");
  const noVA = params.get("no_va");

  if (!userId || !noVA) {
    alert("Parameter tidak lengkap");
    return;
  }

  const url = "https://script.google.com/macros/s/AKfycbzk052mEIwZUHZLcjYcMmHqOPWcARXLS-XUE1hjUYhWP0_P61F6PKIn-HYG21fry0AD/exec";

  fetch(`${url}?user_id=${encodeURIComponent(userId)}&no_va=${encodeURIComponent(noVA)}`)
    .then(res => res.json())
    .then(data => {

      if (data.status !== "success") {
        alert("Data tidak ditemukan");
        return;
      }

      // Isi data utama
      document.getElementById("nama_kepala").innerText = data.nama_kepala;
      document.getElementById("no_va_text").innerText = data.no_va;
      document.getElementById("catatan").innerText = data.catatan;
      document.getElementById("total_tabungan").innerText =
        "Rp " + data.total_tabungan.toLocaleString("id-ID");

      // Isi anggota
      let anggotaList = document.getElementById("anggota_list");
      anggotaList.innerHTML = "";

      data.anggota.forEach((a, index) => {
        anggotaList.innerHTML += `<li>${index+1}. ${a.nama} - ${a.jk}</li>`;
      });

      // Isi transaksi
      let tbody = document.getElementById("tbody_transaksi");
      tbody.innerHTML = "";

      data.transaksi.forEach(trx => {

        const tanggal = new Date(trx.tanggal).toISOString().split("T")[0];

        tbody.innerHTML += `
          <tr>
            <td>${tanggal}</td>
            <td>+ ${trx.nominal.toLocaleString("id-ID")}</td>
            <td>${trx.saldo.toLocaleString("id-ID")}</td>
          </tr>
        `;
      });

    })
    .catch(err => {
      console.error(err);
      alert("Gagal mengambil data dari server");
    });

});
</script>
